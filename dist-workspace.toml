[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.30.4"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew", "npm"]
# Publish npm installer packages under the owner scope because the unscoped
# `aith` package name is blocked by npm's similarity checks.
npm-scope = "@sadjow"
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# Homebrew tap repository used by the generated formula.
tap = "sadjow/homebrew-tap"
# Publish generated package-manager artifacts.
# Requires HOMEBREW_TAP_TOKEN and NPM_TOKEN in the repo secrets.
publish-jobs = ["homebrew", "npm"]
