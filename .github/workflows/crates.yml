name: Publish crate

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  crates-io:
    name: crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Use devenv cache
        uses: cachix/cachix-action@v17
        with:
          name: devenv

      - name: Install devenv
        run: nix profile add nixpkgs#devenv

      - name: Skip without crates.io token
        if: ${{ env.CARGO_REGISTRY_TOKEN == '' }}
        run: echo "Skipping crates.io publish because CARGO_REGISTRY_TOKEN is not configured."

      - name: Publish to crates.io
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        run: devenv shell cargo publish --locked
